name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Release hygiene
        run: bun run check:release-hygiene

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
